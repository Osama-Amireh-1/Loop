name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  DOTNET_VERSION: "10.x"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore src/Loop.sln

      - name: Build
        run: dotnet build src/Loop.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test src/Loop.sln --configuration Release --no-restore --no-build

      - name: Publish
        run: dotnet publish src/Loop.sln --configuration Release --no-restore --no-build

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/Loop.Web.Api/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/loop-web-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/loop-web-api:${{ github.sha }}